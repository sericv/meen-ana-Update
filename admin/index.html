<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>من أنا؟ — لوحة الإدارة</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       AUTH SCREEN
  ══════════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="auth-logo-text">من أنا؟</span>
      </div>
      <h1 class="auth-title">لوحة الإدارة</h1>
      <p class="auth-sub">سجّل الدخول للمتابعة</p>
      <button id="btn-google-signin" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.6 18.9 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.3C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.1C9.4 35.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.4 4.3-4.4 5.7l6.2 5.3C36.9 40.1 44 35 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        تسجيل الدخول بـ Google
      </button>
      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       APP SHELL
  ══════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="brand-name">من أنا؟</span>
          <span class="brand-badge">Admin</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-section="cards" href="#">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="3" width="7" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <rect x="11" y="3" width="7" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <rect x="2" y="14" width="7" height="3" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="11" y="14" width="7" height="3" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          البطاقات
          <span class="nav-count" id="nav-cards-count"></span>
        </a>
        <a class="nav-item" data-section="categories" href="#">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h5M3 10h14M3 15h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="15" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          التصنيفات
          <span class="nav-count" id="nav-cats-count"></span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="conn-indicator" id="conn-indicator">
          <span class="conn-dot"></span>
          <span id="conn-label">متصل</span>
        </div>
        <div class="user-row" id="user-row"></div>
        <button class="btn-signout" id="btn-signout">تسجيل الخروج</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- ── CARDS SECTION ── -->
      <section id="section-cards" class="section">
        <div class="section-top">
          <div class="section-heading">
            <h1 class="section-title">البطاقات</h1>
            <p class="section-sub" id="cards-subtitle">جاري التحميل…</p>
          </div>
          <button class="btn btn-primary" id="btn-add-card">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            بطاقة جديدة
          </button>
        </div>

        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input type="text" id="search-cards" class="search-input" placeholder="ابحث بالاسم أو الإجابة…" />
          </div>
          <select id="filter-cat" class="select-filter">
            <option value="">كل التصنيفات</option>
          </select>
          <select id="filter-status" class="select-filter">
            <option value="">كل الحالات</option>
            <option value="enabled">مفعّل</option>
            <option value="disabled">معطّل</option>
          </select>
        </div>

        <div id="cards-grid" class="cards-grid"></div>

        <div id="cards-empty" class="empty-state hidden">
          <div class="empty-icon">🃏</div>
          <p class="empty-title">لا توجد بطاقات</p>
          <p class="empty-sub">ابدأ بإضافة أول بطاقة للعبة</p>
          <button class="btn btn-primary" id="btn-add-card-empty">+ بطاقة جديدة</button>
        </div>

        <div id="cards-loading" class="loading-state">
          <div class="spinner"></div>
          <p>جاري تحميل البطاقات…</p>
        </div>
      </section>

      <!-- ── CATEGORIES SECTION ── -->
      <section id="section-categories" class="section hidden">
        <div class="section-top">
          <div class="section-heading">
            <h1 class="section-title">التصنيفات</h1>
            <p class="section-sub" id="cats-subtitle"></p>
          </div>
          <button class="btn btn-primary" id="btn-add-cat">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            تصنيف جديد
          </button>
        </div>
        <div id="cats-list" class="cats-list"></div>
        <div id="cats-loading" class="loading-state hidden">
          <div class="spinner"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- ═══════════════════════════════════════
       MODAL
  ══════════════════════════════════════════ -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modal-title" class="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="إغلاق">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       CONFIRM DIALOG
  ══════════════════════════════════════════ -->
  <div id="confirm-backdrop" class="modal-backdrop hidden">
    <div class="confirm-box">
      <p id="confirm-msg" class="confirm-msg"></p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirm-cancel">إلغاء</button>
        <button class="btn btn-danger" id="confirm-ok">تأكيد الحذف</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       TOASTS
  ══════════════════════════════════════════ -->
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
